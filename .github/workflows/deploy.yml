name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }} # e.g. myacr.azurecr.io
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # ── Identity API ─────────────────────────────────────────────────────────
      - name: Build and push identity-api
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/identity-api:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/identity-api:latest \
            -f src/Services/Identity/Dockerfile \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/identity-api:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/identity-api:latest

      - name: Deploy identity-api to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: inventorysaas-identity-api
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/identity-api:${{ github.sha }}
          registryUrl: ${{ env.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}

      # ── API Gateway ───────────────────────────────────────────────────────────
      - name: Build and push gateway
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/gateway:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/gateway:latest \
            -f src/ApiGateway/Dockerfile \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/gateway:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/gateway:latest

      - name: Deploy gateway to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: inventorysaas-gateway
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/gateway:${{ github.sha }}
          registryUrl: ${{ env.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
